site_name: TruLoad Documentation
site_description: User guide, operations guide, and API reference for the TruLoad weighbridge platform.
site_author: TruLoad

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.highlight

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      fallback_to_build_date: true
      type: date

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - User Guide:
      - user-manual/index.md
      - Auth & access: user-manual/auth-and-access.md
      - Weighing: user-manual/weighing.md
      - Cases & prosecution: user-manual/case-and-prosecution.md
      - Financial & reports: user-manual/financial-and-reports.md
      - Setup, RBAC & TruConnect: user-manual/setup-rbac-truconnect.md
      - Install TruConnect: user-manual/truconnect-install.md
      - Troubleshooting: user-manual/troubleshooting.md
  - Operations:
      - technical/index.md
      - Architecture: technical/architecture.md
      - Deployment: technical/deployment-and-environments.md
      - Security: technical/security-assurance.md
      - Integrations (M-PESA): technical/integrations-mpesa.md
      - Backup, DR & troubleshooting: technical/backup-dr-troubleshooting.md
  - API Reference:
      - Swagger: technical/api/swagger.md
      - OpenAPI: technical/api/openapi.md
  - Testing:
      - testing/index.md
      - Test suites: testing/reports.md
      - Live E2E results: testing/live-e2e-results.md
      - Traceability: testing/traceability-matrix.md
      - Compliance checklist: testing/compliance-checklist.md
  - Releases:
      - release-notes/index.md
      - Backend: release-notes/backend.md
      - Frontend: release-notes/frontend.md
      - TruConnect: release-notes/truconnect.md
