site_name: TruLoad Documentation
site_description: Weighbridge platform for axle-load enforcement and commercial weighing operations.
site_author: TruLoad

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.highlight
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      fallback_to_build_date: true
      type: date

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Enforcement:
      - enforcement/index.md
      - Auth & Access: enforcement/auth-and-access.md
      - Weighing: enforcement/weighing.md
      - Cases & Prosecution: enforcement/case-and-prosecution.md
      - Financial & Reports: enforcement/financial-and-reports.md
      - Setup & Configuration: enforcement/setup-rbac-truconnect.md
  - Commercial Weighing:
      - commercial/index.md
      - Getting Started: commercial/getting-started.md
      - Two-Pass Weighing: commercial/two-pass-weighing.md
      - Tare Management: commercial/tare-management.md
      - Weight Tickets: commercial/weight-tickets.md
      - Reports: commercial/reports.md
      - Setup & Configuration: commercial/setup.md
  - Transporter Portal:
      - portal/index.md
      - Registration: portal/registration.md
      - Weighing History: portal/weighing-history.md
      - Subscriptions: portal/subscriptions.md
  - Operations:
      - technical/index.md
      - Architecture: technical/architecture.md
      - Deployment: technical/deployment-and-environments.md
      - Security: technical/security-assurance.md
      - Integrations (M-PESA): technical/integrations-mpesa.md
      - Backup, DR & Troubleshooting: technical/backup-dr-troubleshooting.md
      - TruConnect Install: technical/truconnect-install.md
      - Troubleshooting: technical/troubleshooting.md
  - API Reference:
      - Swagger: technical/api/swagger.md
      - OpenAPI: technical/api/openapi.md
  - Testing:
      - testing/index.md
      - Test Suites: testing/reports.md
      - Live E2E Results: testing/live-e2e-results.md
      - Traceability: testing/traceability-matrix.md
      - Compliance Checklist: testing/compliance-checklist.md
  - Releases:
      - release-notes/index.md
      - Backend: release-notes/backend.md
      - Frontend: release-notes/frontend.md
      - TruConnect: release-notes/truconnect.md
