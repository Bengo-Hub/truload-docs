server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # PDF downloads (User-Manual.pdf, Technical-Operations-Manual.pdf, Client-Evidence-Pack.pdf)
    location /pdf/ {
        add_header Content-Disposition 'attachment';
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
