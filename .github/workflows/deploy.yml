name: Build and Deploy TruLoad Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate and build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install linkchecker

      - name: Validate navigation and file presence
        run: |
          python - <<'PY'
          import os, sys, yaml
          # Allow !!python/name: tags used by pymdownx without importing modules
          yaml.SafeLoader.add_multi_constructor(
              "tag:yaml.org,2002:python/",
              lambda loader, suffix, node: None,
          )
          with open("mkdocs.yml") as f:
              cfg = yaml.safe_load(f)
          missing = []
          def walk(items):
              for i in items:
                  if isinstance(i, dict):
                      for _, v in i.items():
                          if isinstance(v, str) and not os.path.exists(os.path.join("docs", v)):
                              missing.append(v)
                          elif isinstance(v, list):
                              walk(v)
                  elif isinstance(i, str) and not os.path.exists(os.path.join("docs", i)):
                      missing.append(i)
          walk(cfg.get("nav", []))
          if missing:
              print("Missing nav files:")
              for m in missing:
                  print(f"  {m}")
              sys.exit(1)
          print("All nav files exist.")
          PY

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Link check
        run: linkchecker site/ --no-warnings --ignore-url=example.com --ignore-url=github.com || true

  build-image:
    name: Build and push docs image
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            docker.io/codevertex/truload-docs:${{ steps.vars.outputs.sha_short }}
            docker.io/codevertex/truload-docs:latest
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-gitops:
    name: Bump image tag in devops-k8s
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devops-k8s
        uses: actions/checkout@v4
        with:
          repository: Bengo-Hub/devops-k8s
          token: ${{ secrets.GH_PAT }}
          path: devops-k8s

      - name: Bump values.yaml image tag
        run: |
          set -e
          cd devops-k8s
          FILE=apps/truload-docs/values.yaml
          python - <<PY
          import re, sys
          tag = "${{ needs.build-image.outputs.image_tag }}"
          with open("$FILE") as f:
              src = f.read()
          new = re.sub(r"(\n\s*tag:\s*)\S+", rf"\g<1>{tag}", src, count=1)
          with open("$FILE", "w") as f:
              f.write(new)
          PY
          git config user.name  "${{ secrets.GIT_USER  || 'TruLoad Bot' }}"
          git config user.email "${{ secrets.GIT_EMAIL || 'dev@truload.io' }}"
          git add $FILE
          git commit -m "chore(truload-docs): bump image tag to ${{ needs.build-image.outputs.image_tag }}"
          git push origin main
