name: Build and Deploy TruLoad Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Deployment secrets are stored in devops-k8s repo and synced here on demand.
# The sync-secrets job checks which secrets are missing and only requests those.
# GH_PAT must exist in THIS repo to authenticate cross-repo workflow triggers.

jobs:
  validate:
    name: Validate and build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install linkchecker

      - name: Validate navigation and file presence
        run: |
          python - <<'PY'
          import os, sys, yaml
          # Allow !!python/name: tags used by pymdownx without importing modules
          yaml.SafeLoader.add_multi_constructor(
              "tag:yaml.org,2002:python/",
              lambda loader, suffix, node: None,
          )
          with open("mkdocs.yml") as f:
              cfg = yaml.safe_load(f)
          missing = []
          def walk(items):
              for i in items:
                  if isinstance(i, dict):
                      for _, v in i.items():
                          if isinstance(v, str) and not os.path.exists(os.path.join("docs", v)):
                              missing.append(v)
                          elif isinstance(v, list):
                              walk(v)
                  elif isinstance(i, str) and not os.path.exists(os.path.join("docs", i)):
                      missing.append(i)
          walk(cfg.get("nav", []))
          if missing:
              print("Missing nav files:")
              for m in missing:
                  print(f"  {m}")
              sys.exit(1)
          print("All nav files exist.")
          PY

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Link check
        run: linkchecker site/ --no-warnings --ignore-url=example.com --ignore-url=github.com || true

  sync-secrets:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      result: ${{ steps.sync.outputs.result }}
    steps:
      - name: Check and sync missing secrets
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          # Map required secrets to detect empty values (gh secret list can't check values)
          _REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          _REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          _REGISTRY_EMAIL: ${{ secrets.REGISTRY_EMAIL }}
          _KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          REQUIRED_SECRETS="REGISTRY_USERNAME REGISTRY_PASSWORD REGISTRY_EMAIL KUBE_CONFIG"

          # Step 1: Delete any secrets that exist but have empty values.
          # gh secret list reports empty-value secrets as "existing", so the
          # name-only check passes but deployment fails with empty values.
          # By deleting them, the existence check below will find them missing
          # and trigger the devops-k8s sync to recreate them with real values.
          echo "Checking for empty-valued secrets..."
          EXISTING=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")
          for secret in $REQUIRED_SECRETS; do
            env_var="_${secret}"
            value="${!env_var}"
            if echo "$EXISTING" | grep -qx "$secret" && [ -z "$value" ]; then
              echo "  Deleting $secret (exists but empty)"
              gh secret delete "$secret" --repo "${{ github.repository }}" 2>/dev/null || true
            fi
          done

          # Step 2: Re-check which secrets actually exist with values
          echo ""
          echo "Checking which deployment secrets exist..."
          EXISTING=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")

          MISSING=()
          for secret in $REQUIRED_SECRETS; do
            if echo "$EXISTING" | grep -qx "$secret"; then
              echo "  $secret"
            else
              echo "  $secret -- missing"
              MISSING+=("$secret")
            fi
          done

          echo ""
          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "All secrets already exist -- skipping sync"
            echo "result=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          MISSING_LIST="${MISSING[*]}"
          echo "${#MISSING[@]} secret(s) need syncing: $MISSING_LIST"
          echo ""

          # Trigger devops-k8s sync for ONLY the missing secrets
          echo "Triggering devops-k8s/sync-secrets.yml..."
          gh workflow run sync-secrets.yml \
            --repo Bengo-Hub/devops-k8s \
            --ref main \
            -f target_repo="${{ github.repository }}" \
            -f secrets="$MISSING_LIST"

          # Wait for the missing secrets to appear (max 3 min)
          echo "Waiting for secrets to be synced..."
          for i in $(seq 1 18); do
            sleep 10
            CURRENT=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")
            STILL_MISSING=0
            for secret in "${MISSING[@]}"; do
              echo "$CURRENT" | grep -qx "$secret" || STILL_MISSING=$((STILL_MISSING + 1))
            done
            if [ $STILL_MISSING -eq 0 ]; then
              echo "All ${#MISSING[@]} secrets synced after $((i * 10))s"
              echo "result=synced" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  ${STILL_MISSING} still missing ($((i * 10))s)..."
          done

          echo "Timeout -- some secrets may not have synced"
          echo "result=partial" >> $GITHUB_OUTPUT

  build-image:
    name: Build and push docs image
    needs: [validate, sync-secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Re-trigger if secrets were just synced
        if: needs.sync-secrets.outputs.result == 'synced'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Secrets were just synced in this workflow run."
          echo "GitHub loads secret values at job start — newly created secrets"
          echo "are not available until the next run."
          echo ""
          echo "Re-triggering workflow so the deploy job picks up the new values..."
          gh workflow run deploy.yml --repo "${{ github.repository }}" --ref "${{ github.ref }}"
          echo "Workflow re-triggered. This run will exit gracefully."
          exit 0

      - name: Retry and verify secrets if sync was partial
        if: needs.sync-secrets.outputs.result == 'partial'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Secret sync reported partial. Verifying required secrets before aborting..."
          REQUIRED_SECRETS="REGISTRY_USERNAME REGISTRY_PASSWORD REGISTRY_EMAIL KUBE_CONFIG"

          CURRENT=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")
          STILL_MISSING=0
          for secret in $REQUIRED_SECRETS; do
            if echo "$CURRENT" | grep -qx "$secret"; then
              echo "  $secret — present"
            else
              echo "  $secret — missing"
              STILL_MISSING=$((STILL_MISSING + 1))
            fi
          done

          if [ $STILL_MISSING -eq 0 ]; then
            echo "All required secrets present after initial sync — continuing."
          else
            echo "Some secrets still missing — triggering devops-k8s sync and waiting up to 5 minutes..."
            gh workflow run sync-secrets.yml --repo Bengo-Hub/devops-k8s --ref main -f target_repo="${{ github.repository }}"
            for i in $(seq 1 30); do
              sleep 10
              CURRENT=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")
              STILL_MISSING=0
              for secret in $REQUIRED_SECRETS; do
                echo "$CURRENT" | grep -qx "$secret" || STILL_MISSING=$((STILL_MISSING + 1))
              done
              if [ $STILL_MISSING -eq 0 ]; then
                echo "All required secrets synced after $((i * 10))s"
                break
              fi
              echo "  ${STILL_MISSING} still missing ($((i * 10))s)..."
            done

            if [ $STILL_MISSING -ne 0 ]; then
              echo "Secret sync timed out — some secrets may not have been created."
              echo "Check the devops-k8s sync-secrets workflow run for errors:"
              echo "  https://github.com/Bengo-Hub/devops-k8s/actions"
              exit 1
            fi
          fi

      - name: Checkout
        if: needs.sync-secrets.outputs.result != 'synced'
        uses: actions/checkout@v4

      - name: Set variables
        if: needs.sync-secrets.outputs.result != 'synced'
        id: vars
        run: echo "sha_short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Debug available secrets
        if: needs.sync-secrets.outputs.result != 'synced'
        run: |
          echo "Checking which tokens are available..."
          [[ -n "${{ secrets.GH_PAT }}" ]] && echo "✅ GH_PAT is set" || echo "❌ GH_PAT not found"
          [[ -n "${{ secrets.GITHUB_TOKEN }}" ]] && echo "✅ GITHUB_TOKEN is set (default)" || echo "❌ GITHUB_TOKEN not found"
          echo "Note: GH_PAT required for cross-repo push to devops-k8s"

      - name: Verify secrets
        if: needs.sync-secrets.outputs.result != 'synced'
        run: |
          echo "Verifying deployment secrets..."
          echo "Sync result: ${{ needs.sync-secrets.outputs.result }}"
          echo ""
          FAIL=0

          check_secret() {
            local name="$1" min_len="$2" value="$3"
            if [[ -z "$value" ]]; then
              echo "❌ $name — empty"
              FAIL=1
            elif [[ ${#value} -lt $min_len ]]; then
              echo "⚠️  $name — ${#value} chars (need >=$min_len)"
              FAIL=1
            else
              echo "✅ $name (${#value} chars)"
            fi
          }

          check_secret "REGISTRY_USERNAME"  5    "$REGISTRY_USERNAME"
          check_secret "REGISTRY_PASSWORD"  12   "$REGISTRY_PASSWORD"
          check_secret "KUBE_CONFIG"        1000 "$KUBE_CONFIG"

          if [[ $FAIL -eq 1 ]]; then
            echo ""
            echo "❌ Secret verification failed!"
            echo ""
            echo "Possible causes:"
            echo "  1. Secrets were just synced in this workflow run."
            echo "     GitHub loads secrets when each job STARTS."
            echo "     If sync-secrets just created them, re-run this workflow."
            echo ""
            echo "  2. devops-k8s PROPAGATE_PAT may lack write access."
            echo "     Check: https://github.com/Bengo-Hub/devops-k8s/actions"
            echo ""
            echo "  3. Corrupted repo-level secret overriding correct value."
            echo "     Fix: delete the bad secret, then re-run:"
            echo "     gh secret delete <NAME> --repo ${{ github.repository }}"
            exit 1
          fi

          echo ""
          echo "✅ All secrets verified"
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

      - name: Set up QEMU
        if: needs.sync-secrets.outputs.result != 'synced'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: needs.sync-secrets.outputs.result != 'synced'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: needs.sync-secrets.outputs.result != 'synced'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        if: needs.sync-secrets.outputs.result != 'synced'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            docker.io/codevertex/truload-docs:${{ steps.vars.outputs.sha_short }}
            docker.io/codevertex/truload-docs:latest
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-gitops:
    name: Bump image tag in devops-k8s
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.build-image.outputs.image_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devops-k8s
        uses: actions/checkout@v4
        with:
          repository: Bengo-Hub/devops-k8s
          token: ${{ secrets.GH_PAT }}
          path: devops-k8s

      - name: Bump values.yaml image tag
        run: |
          set -e
          cd devops-k8s
          FILE=apps/truload-docs/values.yaml
          python - <<PY
          import re, sys
          tag = "${{ needs.build-image.outputs.image_tag }}"
          with open("$FILE") as f:
              src = f.read()
          new = re.sub(r"(\n\s*tag:\s*)\S+", rf"\g<1>{tag}", src, count=1)
          with open("$FILE", "w") as f:
              f.write(new)
          PY
          git config user.name  "${{ secrets.GIT_USER  || 'TruLoad Bot' }}"
          git config user.email "${{ secrets.GIT_EMAIL || 'dev@truload.io' }}"
          git add $FILE
          git commit -m "chore(truload-docs): bump image tag to ${{ needs.build-image.outputs.image_tag }}"
          git push origin main

  check-argocd:
    name: Check ArgoCD Application status
    needs: bump-gitops
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Check ArgoCD Application status
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
          NS: truload
          APP_NAME: truload-docs
        run: |
          if [ -z "${KUBE_CONFIG_B64}" ]; then
            echo "⏭️ Skipping ArgoCD check - no KUBE_CONFIG available"
            exit 0
          fi

          echo "::group::ArgoCD Application Status"
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config

          # Note: ArgoCD applications are configured with automated sync
          # They will automatically detect git changes and sync when repository is updated
          echo "ℹ️ ArgoCD applications configured for automated sync - no manual intervention needed"

          # Check if ArgoCD Application exists and show its status
          if kubectl get application ${APP_NAME} -n argocd >/dev/null 2>&1; then
            echo "✓ ArgoCD Application '${APP_NAME}' found"

            # Trigger a hard refresh to detect values.yaml changes immediately
            kubectl patch application ${APP_NAME} -n argocd --type merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' || true

            # Show current status
            SYNC_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")

            echo "Current Status - Sync: ${SYNC_STATUS}, Health: ${HEALTH_STATUS}"
            echo "✅ ArgoCD will automatically sync within a few moments"
            echo "📊 Monitor progress: kubectl get application ${APP_NAME} -n argocd -w"
          else
            echo "⚠️ ArgoCD Application '${APP_NAME}' not found"
            echo "📝 Action Required: Run the provision workflow to create ArgoCD Applications"
            echo ""
            echo "Run this command to trigger provisioning:"
            echo "  gh workflow run provision.yml --repo Bengo-Hub/devops-k8s"
            echo ""
            echo "Or manually apply the application:"
            echo "  kubectl apply -f https://raw.githubusercontent.com/Bengo-Hub/devops-k8s/main/apps/truload-docs/app.yaml"

            # Don't fail the workflow - application might not be set up yet
            echo ""
            echo "⚠️ Continuing without ArgoCD sync check (Application not found)"
          fi
          echo "::endgroup::"

      - name: Verify docs health
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
          NS: truload
        run: |
          if [ -z "${KUBE_CONFIG_B64}" ]; then
            echo "⏭️ Skipping health check - no KUBE_CONFIG available"
            exit 0
          fi

          echo "::group::Health check"
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config

          # Check if deployment exists before checking rollout status
          if kubectl get deployment truload-docs -n ${NS} >/dev/null 2>&1; then
            echo "✓ Deployment found, checking rollout status..."

            # Wait for deployment to be rolled out
            if kubectl rollout status deployment/truload-docs -n ${NS} --timeout=300s; then
              echo "✅ Deployment rollout successful"

              # Try ingress health endpoint
              HOSTS=$(kubectl get ingress -n ${NS} -o jsonpath='{.items[*].spec.rules[*].host}' | tr ' ' '\n' | grep -E 'docs' || true)
              if [ -n "$HOSTS" ]; then
                STATUS=1
                for H in $HOSTS; do
                  echo "Checking https://$H/ ..."
                  if curl -sk --max-time 10 "https://$H/" | grep -Ei "truload|<!DOCTYPE html>" >/dev/null; then
                    echo "✅ Health OK for $H"
                    STATUS=0
                    break
                  fi
                done
                if [ $STATUS -ne 0 ]; then
                  echo "⚠️ Health endpoint did not return expected content; rollout completed but may still be initializing"
                fi
              else
                echo "No ingress host found; skipping external health probe"
              fi
            else
              echo "⚠️ Deployment rollout check timed out or failed"
              exit 1
            fi
          else
            echo "⚠️ Deployment not found yet - ArgoCD may still be syncing"
            echo "ℹ️ This is normal if the ArgoCD Application was just created"
            echo ""
            echo "Check ArgoCD sync status with:"
            echo "  kubectl get application truload-docs -n argocd"
            echo ""
            echo "Check deployment status with:"
            echo "  kubectl get deployment truload-docs -n ${NS}"
            echo ""
            echo "⚠️ Skipping health check (deployment not found)"
          fi
          echo "::endgroup::"
